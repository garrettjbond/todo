<html>

<head>
  <title>To Do List</title>
  <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="./dist/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <main>
    <div class="list-form">
      <h1>To Do List</h1>
      <ul>
        <li class="listItem hidden clonecopy">
          <span>
            <i class="fa-regular fa-square"></i>
          </span>
          <p class="" contentEditable="true">Click on me to edit</p>
          <span class="deleteMe"><i class="fa-solid fa-trash-can"></i></span>
        </li>
        <li class="listItem"><span><i class="fa-regular fa-square"></i></span>
          <p contentEditable="true">Build a sweet new web app</p>
          <span class="deleteMe">
            <i class="fa-solid fa-trash-can"></i>
          </span>
        </li>
        <li class="listItem"><span><i class="fa-regular fa-square"></i></span>
          <p contentEditable="true">Click on me to edit</p>
          <span class="deleteMe">
            <i class="fa-solid fa-trash-can"></i>
          </span>
        </li>
      </ul>
      <button class="addItem">+</button>
    </div>
  </main>
  <footer>©2026 Garrett Bond</footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./src/js/main.js"></script>
</body>

</html>
